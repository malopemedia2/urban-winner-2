    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            font-family: 'Poppins', sans-serif;
            color: white;
        }

        /* NAVBAR */
        nav {
            position: fixed;
            width: 100%;
            top: 0;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #000;
            z-index: 1000;
            border-bottom: 1px solid #111;
        }

        nav h1 {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            letter-spacing: 2px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 25px;
            transition: 0.3s;
        }

        nav a:hover {
            color: crimson;
        }

        /* PAGE TITLE */
        .header {
            padding-top: 120px;
            padding-left: 60px;
            padding-bottom: 40px;
        }

        .header h2 {
            font-size: 40px;
            font-family: 'Playfair Display', serif;
            position: relative;
            display: inline-block;
            animation: glow 2s ease-in-out infinite alternate, float 4s ease-in-out infinite;
        }

        /* Glow Animation */
        @keyframes glow {
            from {
                text-shadow: 0 0 5px rgb(33, 20, 220), 0 0 10px crimson;
            }

            to {
                text-shadow: 0 0 20px rgb(235, 117, 6), 0 0 40px crimson;
            }
        }

        /* Floating Animation */
        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-6px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        /* SHOW GRID */
        .show-container {
            padding: 0 60px 60px 60px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        /* SHOW CARD */
        .show-card {
            background: #111;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .show-card img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            display: block;
        }

        /* HOVER EFFECT */
        .show-card:hover {
            transform: scale(1.08);
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.5);
            z-index: 5;
        }

        /* CARD INFO */
        .card-info {
            padding: 15px;
        }

        .card-info h3 {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .card-info p {
            font-size: 14px;
            color: #bbb;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 30px;
            background: #111;
            color: #777;
        }
    </style>
</head>

                    if (doc.data().extraCss) {
