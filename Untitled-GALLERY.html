<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TX Theatre | Gallery</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0f23;
            font-family: 'Poppins', sans-serif;
            color: white;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: auto;
            padding: 50px 0;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: hsla(31, 100%, 50%, 0.478);
            text-align: center;
            margin: 50px 0 25px;
            text-shadow: 0 0 15px rgba(0, 191, 255, 0.7);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 60px;
        }

        .gallery img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid rgba(0, 191, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 191, 255, 0.6);
            cursor: pointer;
            transition: 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 35px rgba(0, 191, 255, 1);
        }

        /* MODAL */
        #modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 30, 0.95);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #modal img {
            max-width: 90%;
            max-height: 90%;
            border: 3px solid #00bfff;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0, 191, 255, 0.9);
        }

        #close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: #00bfff;
            cursor: pointer;
        }
    </style>
</head>
